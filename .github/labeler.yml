# Labeler configuration for automatic PR labeling
# Labels are applied based on changed files in pull requests

# Python code changes
python:
  - changed-files:
    - any-glob-to-any-file: '**/*.py'

# YAML configuration changes
yaml:
  - changed-files:
    - any-glob-to-any-file: '**/*.yml'
    - any-glob-to-any-file: '**/*.yaml'

# Documentation
documentation:
  - changed-files:
    - any-glob-to-any-file: '*.md'
    - any-glob-to-any-file: 'docs/**'

# Data files
data:
  - changed-files:
    - any-glob-to-any-file: '**/*.csv'
    - any-glob-to-any-file: '**/*.json'
    - any-glob-to-any-file: '**/*.xlsx'

# Jupyter notebooks
notebook:
  - changed-files:
    - any-glob-to-any-file: '**/*.ipynb'
