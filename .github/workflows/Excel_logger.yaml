name: Automated Decades Change Logger

# Trigger the workflow ONLY when pushing to the Decades branch
on:
  push:
    branches:
      - '*'

jobs:
  build-and-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for clean branch switching

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
# Step 2: Run the script and tell it exactly which branch triggered it

      - name: Execute Change Log Parser
      env:
      GITHUB_BRNACH: ${{ github.ref_name}}
        run: python scripts/parse_sba_changes.py
# Step 3: Push the updated log back to the exact branch that triggered it

      - name: Commit and Push Updated Log
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ChangeLog
          git diff-index --quiet HEAD || git commit -m "docs: auto-update log for ${{ github.ref.name }} [skip ci]"
          git push origin ${{github.ref.name }}
